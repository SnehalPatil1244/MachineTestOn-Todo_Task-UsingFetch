<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <title>Document</title>
    <style>
        body {
            background: #f5f6fa;
        }
        .spinner{
             position: fixed;
            height: 100vh;
            width: 100%;
            top: 0;
            left: 0;
            text-align: center;
            align-content: center;
            background: rgba(255, 255, 255, 0.7);

        }
    </style>
</head>

<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6  offset-md-3 mb-md-3">
                <h2 class="mb-3 text-center">Add Todo</h2>
                <form id="todoForm" class="card p-3">
                    <div class="form-group">
                        <input type="text" id="todo" class="form-control" placeholder="Enter Todo">
                    </div>
                    <div class="form-group">
                        <input type="text" id="userId" class="form-control" placeholder="Enter UserId">
                    </div>
                    <button type="submit" class="btn btn-outline-primary" id="addtodobtn"> Add Todo</button>
                    <button type="button" class="btn btn-outline-primary d-none" id="updatetodobtn"> Update Todo</button>
                </form>
            </div>
        </div>

        <div class="row mt-4" id="todoContainer"></div>

    </div>
    <div class="spinner" id="spinner">
        <div class="spinner-border d-none" role="status">
  <span class="sr-only"></span>
</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
   <script src="./assets/js/app.js"></script>

</body>

</html>
